name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Production build
        env:
          VITE_SITE_URL: https://abdiplomahub.com
          VITE_API_URL: ""
        run: npm run build

  backend:
    name: Backend tests & config check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Lint (compile)
        run: python -m compileall -q app scripts
      - name: Run tests
        env:
          ENVIRONMENT: development
          ENABLE_API_DOCS: "false"
          AUTH_COOKIE_SECURE: "false"
        run: python -m pytest tests -q
      - name: Production configuration check
        env:
          ENVIRONMENT: production
          SECRET_KEY: ci-production-check-secret-key-not-for-real-use
          FRONTEND_URL: https://abdiplomahub.com
          ENABLE_API_DOCS: "false"
          STRUCTURED_LOGGING: "true"
          ADMIN_EMAILS: ci@example.com
          # Explicit so a future committed .env cannot disable Secure in CI
          AUTH_COOKIE_SECURE: "true"
          SENTRY_DSN: ""
        run: python scripts/check_production_config.py
